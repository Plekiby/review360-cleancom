name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to O2switch staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: https://staging.sc1juwa0721.universe.wf/api

      - name: Deploy frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          port: 21
          local-dir: frontend/dist/
          server-dir: /staging.sc1juwa0721.universe.wf/
          dangerous-clean-slate: false

      - name: Upload .htaccess via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          port: 21
          local-dir: backend/
          server-dir: /staging.sc1juwa0721.universe.wf/
          include: |
            .htaccess
          dangerous-clean-slate: false

      - name: Trigger backend deploy via webhook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://staging.sc1juwa0721.universe.wf/deploy \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 10 || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Backend webhook failed (HTTP $STATUS) — redémarrage manuel requis"
          else
            echo "✅ Backend deploy déclenché"
          fi

      - name: Smoke test staging
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.sc1juwa0721.universe.wf/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Staging OK"

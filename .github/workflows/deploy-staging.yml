name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    name: Deploy to O2switch staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://staging.sc1juwa0721.universe.wf/api

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/review360-backend-staging
            git pull origin develop
            cd backend
            npm ci --production
            NODE_ENV=staging node src/db/migrate.js
            pm2 restart review360-staging || pm2 start ecosystem.config.cjs --only review360-staging
            echo "✅ Backend staging redémarré"

      - name: Clear old frontend files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          script: |
            rm -rf ~/staging.sc1juwa0721.universe.wf/*
            mkdir -p ~/staging.sc1juwa0721.universe.wf

      - name: Copy frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          source: 'frontend/dist/*'
          target: '~/staging.sc1juwa0721.universe.wf/'
          strip_components: 2

      - name: Copy .htaccess
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          source: 'backend/.htaccess'
          target: '~/staging.sc1juwa0721.universe.wf/'
          strip_components: 1

      - name: Smoke test staging
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.sc1juwa0721.universe.wf/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Staging health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Staging OK"

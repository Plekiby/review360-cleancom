name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Déclenchement manuel possible

jobs:
  deploy-prod:
    name: Deploy to O2switch production
    runs-on: ubuntu-latest
    environment: production  # Requiert validation manuelle dans GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        if: ${{ hashFiles('frontend/package.json') != '' }}
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://suivi360.cleancom.fr/api

      - name: Backup base de données avant déploiement
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          script: |
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            pg_dump ${{ secrets.DB_NAME_PROD }} > ~/backups/db/backup_${TIMESTAMP}.sql
            echo "✅ Backup DB créé: backup_${TIMESTAMP}.sql"

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/review360-backend
            git pull origin main
            npm ci --production
            NODE_ENV=production node src/db/migrate.js
            pm2 restart review360-prod || pm2 start src/server.js --name review360-prod
            pm2 save
            echo "✅ Backend production déployé"

      - name: Copy frontend build
        uses: appleboy/scp-action@v0.1.7
        if: ${{ hashFiles('frontend/package.json') != '' }}
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          source: 'frontend/dist/*'
          target: '~/apps/review360-frontend/dist'
          strip_components: 2

      - name: Smoke test production
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://suivi360.cleancom.fr/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Production OK"

      - name: Tag version
        if: success()
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          git tag "v${VERSION}-$(date +%Y%m%d)"
          git push origin --tags

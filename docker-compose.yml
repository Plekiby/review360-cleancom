services:
  db:
    image: postgres:16-alpine
    container_name: review360_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: review360
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: review360_dev
    ports:
      - "5432:5432"
    volumes:
      - review360_pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  review360_pgdata:
